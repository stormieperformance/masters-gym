<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidan hittades inte — Masters Gym Stockholm</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0A08;--text:#f0ede6;--muted:rgba(240,237,230,0.55);--teal:#74C1BB;--sans:'DM Sans',sans-serif;--display:'Barlow Condensed',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
  .code{font-family:var(--display);font-style:italic;font-weight:800;font-size:clamp(80px,18vw,160px);color:var(--teal);line-height:1;letter-spacing:.02em}
  h1{font-family:var(--display);font-style:italic;font-weight:800;font-size:clamp(24px,4vw,34px);letter-spacing:.04em;text-transform:uppercase;margin:12px 0 16px}
  p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:32px}
  a{display:inline-block;padding:14px 32px;border:1px solid var(--teal);color:var(--teal);text-decoration:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase;transition:background .2s,color .2s}
  a:hover,a:focus-visible{background:var(--teal);color:#0A0A08}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Sidan hittades inte</h1>
    <p>Sidan du letar efter finns inte, eller så har den flyttats.</p>
    <a href="/">Till startsidan →</a>
  </div>
</body>
</html>
