name: Generate schedule calendar feeds

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/generate_ics.py'
      - '.github/workflows/generate-schedule-feeds.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate .ics feeds from the schedule
        run: python3 scripts/generate_ics.py

      - name: Commit updated feeds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          if git diff --cached --quiet; then
            echo "No schedule changes, nothing to commit."
          else
            git commit -m "Auto-update schedule calendar feeds"
            git push origin HEAD:main -v
          fi
