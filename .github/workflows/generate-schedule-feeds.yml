name: Generate schedule calendar feeds

on:
  schedule:
    # Runs every 30 minutes. Adjust if the schedule updates less often.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}  # allows manually triggering a run from the Actions tab
  push:
    paths:
      - 'scripts/generate_ics.py'
      - '.github/workflows/generate-schedule-feeds.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate .ics feeds from the schedule
        run: python3 scripts/generate_ics.py

      - name: Commit updated feeds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          if git diff --cached --quiet; then
            echo "No schedule changes, nothing to commit."
          else
            git commit -m "Auto-update schedule calendar feeds"
            git push
          fi
